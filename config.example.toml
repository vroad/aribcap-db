# Upstream endpoint that streams the JSONL produced by aribcap-dump.
[upstream]
url_template = "http://localhost:40772/api/timeshift/{{ channel }}/tuner-stream?post-filters[]=aribcap-dump"
# Route every request through a Unix socket when configured.
# unix_socket = "/run/mirakc/mirakc.sock"

[streams.nhk]
label = "NHK"
vars.channel = "nhk"

[streams.nhke]
label = "NHK-E"
vars.channel = "nhke"

[serve]
data_dir = "./aribcap-db-data"
# List any number of `{ tcp = "..." }` and `{ unix_socket = "..." }` entries.
addrs = [
  { tcp = "127.0.0.1:40773" },
  # { unix_socket = "/run/aribcap-db/aribcap-db.sock" },
]
retention = "30d"
# Expose the read-only HTTP MCP server at /mcp.
mcp = false
